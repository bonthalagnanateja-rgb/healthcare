name: Deploy Next.js (static) to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        # `next.config.js` must contain `output: 'export'` and basePath settings
        run: npm run build

      - name: Verify export output
        run: |
          if [ -d out ]; then
            echo "out directory exists:"
            ls -la out | sed -n '1,200p'
          else
            echo "ERROR: out directory missing. Build failed or output: 'export' not set." >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          keep_files: false

      - name: Cleanup
        if: ${{ always() }}
        run: rm -rf node_modules .next out || true
